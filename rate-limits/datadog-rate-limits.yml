specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Datadog
providerId: datadog
created: '2026-05-04'
modified: '2026-05-04'
reconciled: true
tags:
  - Rate Limiting
  - Observability
description: Datadog v1/v2 API rate limits vary by endpoint. Common patterns shown.
sources:
  - https://www.datadoghq.com/pricing/
  - https://docs.datadoghq.com/api/latest/rate-limits/
headers:
  limit: X-RateLimit-Limit
  remaining: X-RateLimit-Remaining
  reset: X-RateLimit-Reset
  period: X-RateLimit-Period
  resetTime: X-RateLimit-Reset
responseCodes:
  throttled: 429
limits:
  - name: Metrics intake
    scope: org
    metric: metrics_per_second
    limit: default contract
    notes: Custom metric limits vary by contract; raise via support.
  - name: Log intake
    scope: org
    metric: GB_per_minute
    limit: elastic
    notes: Log ingest scales with contract; throttling rare.
  - name: Read endpoints (default)
    scope: org
    metric: requests_per_minute
    limit: 600
    timeFrame: minute
  - name: Logs query
    scope: org
    metric: requests_per_minute
    limit: 300
    timeFrame: minute
  - name: Synthetics
    scope: org
    metric: requests_per_minute
    limit: 60
    timeFrame: minute
  - name: Dashboards
    scope: org
    metric: requests_per_hour
    limit: 60
    timeFrame: hour
policies:
  - name: Per-endpoint limits
    description: Each endpoint has its own rate limit; check the Datadog API docs page for specifics.
  - name: Contact support to raise
    description: Custom limits available via Datadog support for contracted customers.
