specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Datadog
providerId: datadog
created: '2026-05-04'
modified: '2026-05-04'
reconciled: true
tags:
  - FinOps
  - Cost Management
  - FOCUS
  - Observability
description: 'FOCUS-aligned FinOps for Datadog: per-host subscriptions plus metered usage for logs, custom
  metrics, traces, and synthetics.'
sources:
  - https://www.datadoghq.com/pricing/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Datadog, Inc.
serviceCategory: Observability
billingModel:
  pricingCategory: Subscription + Usage-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Credit
    - Adjustment
focusColumns:
  ServiceName: Datadog
  ServiceCategory: Observability
  ProviderName: Datadog
  PublisherName: Datadog, Inc.
  InvoiceIssuerName: Datadog, Inc.
  BillingCurrency: USD
meters:
  - name: infra_hosts
    unit: host-hour
    aggregation: sum
    dimensions:
      - org
      - tag
      - host_type
  - name: apm_hosts
    unit: host-hour
    aggregation: sum
  - name: log_ingest_gb
    unit: GB
    aggregation: sum
    dimensions:
      - org
      - service
      - source
  - name: log_indexed_events
    unit: million_events
    aggregation: sum
    dimensions:
      - index
      - retention
  - name: custom_metrics
    unit: metric
    aggregation: max
    dimensions:
      - org
      - namespace
  - name: synthetic_test_runs
    unit: test_run
    aggregation: sum
    dimensions:
      - test_type
      - location
  - name: rum_sessions
    unit: session
    aggregation: sum
  - name: ci_pipeline_committers
    unit: committer
    aggregation: max
principles:
  - name: Visibility
    description: Use Usage Metering and Cost Management for granular spend by team/service.
  - name: Allocation
    description: Apply consistent host tags (env, team, service) to enable team-level chargeback.
  - name: Optimization
    description: Drop unneeded log fields at ingest, use Flex storage for cold logs, prune high-cardinality
      custom metrics.
  - name: Accountability
    description: Set per-team usage budgets and weekly reviews of Cost Management dashboard.
