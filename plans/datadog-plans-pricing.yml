specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Datadog
providerId: datadog
created: '2026-05-04'
modified: '2026-05-04'
reconciled: true
tags:
  - Observability
  - APM
  - Logs
  - Infrastructure Monitoring
description: Datadog product-suite pricing. All product lines have Free / Pro / Enterprise tiers; pricing
  shown is annual rate per host or per unit.
sources:
  - https://www.datadoghq.com/pricing/
plans:
  - id: datadog-infra-free
    name: Infrastructure Monitoring Free
    type: freemium
    description: 'Free tier: up to 5 hosts, 1-day metric retention.'
    entries:
      - label: Hosts
        name: hosts
        type: quota
        metric: host
        limit: 5
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Up to 5 hosts
      - name: 1-day metric retention
      - name: Core collection and visualization
  - id: datadog-infra-pro
    name: Infrastructure Monitoring Pro
    type: paid
    description: $15/host/month annual. 1,000+ integrations, 15-month retention.
    entries:
      - label: Per host
        name: host
        type: subscription
        metric: host
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '15.00'
        userMultiplied: false
      - label: Custom metrics included
        name: custom_metrics
        type: quota
        metric: metric_per_host
        limit: 100
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: 1,000+ integrations
      - name: 15-month metric retention
      - name: 100 custom metrics per host
  - id: datadog-infra-enterprise
    name: Infrastructure Monitoring Enterprise
    type: enterprise
    description: $23/host/month annual. ML-based alerts, Live Processes, Governance Console.
    entries:
      - label: Per host
        name: host
        type: subscription
        metric: host
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '23.00'
        userMultiplied: false
      - label: Custom metrics included
        name: custom_metrics
        type: quota
        metric: metric_per_host
        limit: 200
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Watchdog ML alerts
      - name: Live Processes
      - name: Governance Console
      - name: 200 custom metrics per host
  - id: datadog-apm
    name: APM
    type: paid
    description: $31/host/month annual when bundled with Infrastructure.
    entries:
      - label: Per host with Infrastructure
        name: host
        type: subscription
        metric: host
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '31.00'
        userMultiplied: false
    elements:
      - name: End-to-end distributed traces
      - name: Service dependency maps
      - name: RED metrics with 15-month retention
  - id: datadog-apm-pro
    name: APM Pro
    type: paid
    description: $35/host/month with Data Streams Monitoring included.
    entries:
      - label: Per host with Infrastructure
        name: host
        type: subscription
        metric: host
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '35.00'
        userMultiplied: false
    elements:
      - name: Data Streams Monitoring
      - name: Pipeline latency tracking
      - name: Queue dependency mapping
  - id: datadog-apm-enterprise
    name: APM Enterprise
    type: enterprise
    description: $40/host/month with Continuous Profiler.
    entries:
      - label: Per host with Infrastructure
        name: host
        type: subscription
        metric: host
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '40.00'
        userMultiplied: false
    elements:
      - name: Continuous Profiler
      - name: Code-level performance tracing
      - name: CPU/memory profiles
  - id: datadog-logs
    name: Log Management
    type: metered
    description: $0.10/GB ingest + indexing. Flex Storage for cold logs.
    entries:
      - label: Log ingest
        name: log_ingest
        type: metered
        metric: GB
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.10'
        userMultiplied: false
      - label: Standard indexing (15-day retention)
        name: log_index_15d
        type: metered
        metric: events
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1000000
        price: '1.70'
        userMultiplied: false
      - label: Flex Storage
        name: log_flex
        type: metered
        metric: events
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1000000
        price: '0.05'
        userMultiplied: false
    elements:
      - name: 200+ log sources
      - name: Log enrichment and tagging
      - name: Up to 15 months retention via Flex
