naftiko: 1.0.0-alpha2
info:
  label: Datadog API — Save
  description: 'Datadog API — Save. 1 operations. Lead operation: Datadog Save New Value for On-demand Concurrency Cap. Self-contained
    Naftiko capability covering one Datadog business surface.'
  tags:
  - Datadog
  - Save
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DATADOG_API_KEY: DATADOG_API_KEY
capability:
  consumes:
  - type: http
    namespace: datadog-save
    baseUri: https://{subdomain}.{site}
    description: Datadog API — Save business capability. Self-contained, no shared references.
    resources:
    - name: api-v2-synthetics-settings-on_demand_concurrency_cap
      path: /api/v2/synthetics/settings/on_demand_concurrency_cap
      operations:
      - name: setondemandconcurrencycap
        method: POST
        description: Datadog Save New Value for On-demand Concurrency Cap
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.DATADOG_API_KEY}}'
  exposes:
  - type: rest
    namespace: datadog-save-rest
    port: 8080
    description: REST adapter for Datadog API — Save. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/api/v2/synthetics/settings/on-demand-concurrency-cap
      name: api-v2-synthetics-settings-on-demand-concurrency-cap
      description: REST surface for api-v2-synthetics-settings-on_demand_concurrency_cap.
      operations:
      - method: POST
        name: setondemandconcurrencycap
        description: Datadog Save New Value for On-demand Concurrency Cap
        call: datadog-save.setondemandconcurrencycap
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: datadog-save-mcp
    port: 9090
    transport: http
    description: MCP adapter for Datadog API — Save. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: datadog-save-new-value-demand
      description: Datadog Save New Value for On-demand Concurrency Cap
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: datadog-save.setondemandconcurrencycap
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
