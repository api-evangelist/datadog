        filter[pct]: tools.filter[pct]
        filter[timespan_h]: tools.filter[timespan_h]
      outputParameters:
      - type: object
        mapping: $.
    - name: datadog-delete-tag-configuration
      description: Datadog Delete a Tag Configuration
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: datadog-configuration.deletetagconfiguration
      outputParameters:
      - type: object
        mapping: $.
    - name: datadog-list-tag-configuration-name
      description: Datadog List Tag Configuration by Name
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: datadog-configuration.listtagconfigurationbyname
      outputParameters:
      - type: object
        mapping: $.
    - name: datadog-update-tag-configuration
      description: Datadog Update a Tag Configuration
      hints:
