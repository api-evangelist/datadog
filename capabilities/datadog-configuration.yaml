    - name: datadog-create-monitor-configuration-policy
      description: Datadog Create a Monitor Configuration Policy
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: datadog-configuration.createmonitorconfigpolicy
      with:
        body: tools.body
