naftiko: 1.0.0-alpha2
info:
  label: Datadog Synthetic Testing
  description: Unified workflow for synthetic testing combining synthetics concurrency management and monitors. Used by QA
    engineers and SREs for managing synthetic test execution capacity and monitoring test results.
  tags:
  - Datadog
  - Synthetic Testing
  - Synthetics
  - Monitors
  - QA
  personas:
  - QA Engineer
  - SRE
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    DATADOG_API_KEY: DATADOG_API_KEY
    DATADOG_APP_KEY: DATADOG_APP_KEY
capability:
  consumes:
  - type: http
    namespace: dd-synthetics
    baseUri: https://api.datadoghq.com
    description: Datadog Synthetics API for managing on-demand concurrency cap settings. Sourced from datadog-api-openapi.yml
      (2 operations on synthetics settings).
    authentication:
      type: apikey
      headers:
        DD-API-KEY: '{{DATADOG_API_KEY}}'
        DD-APPLICATION-KEY: '{{DATADOG_APP_KEY}}'
    resources:
    - name: synthetics-settings
      path: /api/v2/synthetics/settings/on_demand_concurrency_cap
      description: Synthetics on-demand concurrency cap operations.
      operations:
      - name: GetOnDemandConcurrencyCap
        method: GET
        description: Get the on-demand concurrency cap.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: SetOnDemandConcurrencyCap
        method: POST
        description: Save new value for on-demand concurrency cap.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: dd-monitors
    baseUri: https://api.datadoghq.com
    description: Datadog Monitors API for creating, reading, updating, deleting, muting, unmuting, and validating monitors.
    authentication:
      type: apikey
      headers:
        DD-API-KEY: '{{DATADOG_API_KEY}}'
        DD-APPLICATION-KEY: '{{DATADOG_APP_KEY}}'
    resources:
    - name: monitors
      path: /api/v1/monitor
      description: Monitor collection operations.
      operations:
      - name: createMonitor
        method: POST
        description: Create a monitor.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: listMonitors
        method: GET
        description: List all monitors.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: monitor
      path: /api/v1/monitor/{monitor_id}
      description: Individual monitor operations.
      operations:
      - name: getMonitor
        method: GET
        description: Get a monitor.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateMonitor
        method: PUT
        description: Edit a monitor.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleteMonitor
        method: DELETE
        description: Delete a monitor.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: monitor-muting
      path: /api/v1/monitor/{monitor_id}
      description: Mute and unmute monitor notifications.
      operations:
      - name: muteMonitor
        method: POST
        path: /api/v1/monitor/{monitor_id}/mute
        description: Mute a monitor.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: unmuteMonitor
        method: POST
        path: /api/v1/monitor/{monitor_id}/unmute
        description: Unmute a monitor.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: monitor-validation
      path: /api/v1/monitor/validate
      description: Validate monitor configurations before creation.
      operations:
      - name: validateMonitor
        method: POST
        description: Validate a monitor.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8083
    namespace: dd-synthetic-testing-api
    description: Unified REST API for synthetic testing workflows combining synthetics and monitors.
    resources:
    - path: /v1/synthetics/concurrency-cap
      name: synthetics-concurrency-cap
      description: Synthetics concurrency settings
      operations:
      - method: GET
        name: GetOnDemandConcurrencyCap
        description: Get the on-demand concurrency cap
        call: dd-synthetics.GetOnDemandConcurrencyCap
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: SetOnDemandConcurrencyCap
        description: Set the on-demand concurrency cap
        call: dd-synthetics.SetOnDemandConcurrencyCap
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/monitors
      name: monitors
      description: Monitor management for synthetic alerts
      operations:
      - method: GET
        name: listMonitors
        description: List monitors
        call: dd-monitors.listMonitors
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createMonitor
        description: Create a monitor
        call: dd-monitors.createMonitor
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/monitors/{monitor_id}
      name: monitor
      description: Individual monitor operations
      operations:
      - method: GET
        name: getMonitor
        description: Get a monitor
        call: dd-monitors.getMonitor
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateMonitor
        description: Update a monitor
        call: dd-monitors.updateMonitor
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteMonitor
        description: Delete a monitor
        call: dd-monitors.deleteMonitor
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/monitors/{monitor_id}/mute
      name: monitor-mute
      description: Mute synthetic alert monitors
      operations:
      - method: POST
        name: muteMonitor
        description: Mute a monitor
        call: dd-monitors.muteMonitor
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/monitors/validate
      name: monitor-validate
      description: Validate synthetic monitor configurations
      operations:
      - method: POST
        name: validateMonitor
        description: Validate a monitor
        call: dd-monitors.validateMonitor
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9083
    namespace: dd-synthetic-testing-mcp
    transport: http
    description: MCP server for AI-assisted synthetic testing workflows.
    tools:
    - name: get-concurrency-cap
      description: Get the synthetics on-demand concurrency cap
      call: dd-synthetics.GetOnDemandConcurrencyCap
      hints:
        readOnly: true
    - name: set-concurrency-cap
      description: Set a new synthetics on-demand concurrency cap
      call: dd-synthetics.SetOnDemandConcurrencyCap
    - name: list-monitors
      description: List monitors including synthetic alert monitors
      call: dd-monitors.listMonitors
      hints:
        readOnly: true
    - name: get-monitor
      description: Get a monitor by ID
      call: dd-monitors.getMonitor
      hints:
        readOnly: true
    - name: create-monitor
      description: Create a synthetics alert monitor
      call: dd-monitors.createMonitor
    - name: update-monitor
      description: Update a synthetics alert monitor
      call: dd-monitors.updateMonitor
      hints:
        idempotent: true
    - name: delete-monitor
      description: Delete a monitor
      call: dd-monitors.deleteMonitor
      hints:
        destructive: true
    - name: mute-monitor
      description: Mute a synthetic test monitor
      call: dd-monitors.muteMonitor
    - name: unmute-monitor
      description: Unmute a synthetic test monitor
      call: dd-monitors.unmuteMonitor
    - name: validate-monitor
      description: Validate a synthetic monitor configuration
      call: dd-monitors.validateMonitor
      hints:
        readOnly: true
