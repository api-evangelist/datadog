naftiko: 1.0.0-alpha2
info:
  label: Datadog API — Reorder
  description: 'Datadog API — Reorder. 1 operations. Lead operation: Datadog Reorder Groups. Self-contained Naftiko capability
    covering one Datadog business surface.'
  tags:
  - Datadog
  - Reorder
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DATADOG_API_KEY: DATADOG_API_KEY
capability:
  consumes:
  - type: http
    namespace: datadog-reorder
    baseUri: https://{subdomain}.{site}
    description: Datadog API — Reorder business capability. Self-contained, no shared references.
    resources:
    - name: api-v2-sensitive-data-scanner-config
      path: /api/v2/sensitive-data-scanner/config
      operations:
      - name: reorderscanninggroups
        method: PATCH
        description: Datadog Reorder Groups
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.DATADOG_API_KEY}}'
  exposes:
  - type: rest
    namespace: datadog-reorder-rest
    port: 8080
    description: REST adapter for Datadog API — Reorder. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/v2/sensitive-data-scanner/config
      name: api-v2-sensitive-data-scanner-config
      description: REST surface for api-v2-sensitive-data-scanner-config.
      operations:
      - method: PATCH
        name: reorderscanninggroups
        description: Datadog Reorder Groups
        call: datadog-reorder.reorderscanninggroups
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: datadog-reorder-mcp
    port: 9090
    transport: http
    description: MCP adapter for Datadog API — Reorder. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: datadog-reorder-groups
      description: Datadog Reorder Groups
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: datadog-reorder.reorderscanninggroups
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
