    port: 9090
    transport: http
    description: MCP adapter for Datadog API — Enabled. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: datadog-delete-sts-enabled-gcp
      description: Datadog Delete an Sts Enabled Gcp Account
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: datadog-enabled.deletegcpstsaccount
      outputParameters:
      - type: object
        mapping: $.
