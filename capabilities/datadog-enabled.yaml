      type: bearer
      token: '{{env.DATADOG_API_KEY}}'
  exposes:
  - type: rest
    namespace: datadog-enabled-rest
    port: 8080
    description: REST adapter for Datadog API — Enabled. One Spectral-compliant resource per consumed operation, prefixed
