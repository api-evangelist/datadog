  description: 'Datadog API — Enabled. 1 operations. Lead operation: Datadog Delete an Sts Enabled Gcp Account. Self-contained
    Naftiko capability covering one Datadog business surface.'
  tags:
  - Datadog
  - Enabled
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DATADOG_API_KEY: DATADOG_API_KEY
capability:
  consumes:
  - type: http
    namespace: datadog-enabled
    baseUri: https://{subdomain}.{site}
    description: Datadog API — Enabled business capability. Self-contained, no shared references.
    resources:
    - name: api-v2-integration-gcp-accounts-account_id
      path: /api/v2/integration/gcp/accounts/{account_id}
      operations:
      - name: deletegcpstsaccount
        method: DELETE
        description: Datadog Delete an Sts Enabled Gcp Account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
