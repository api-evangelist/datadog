naftiko: 1.0.0-alpha2
info:
  label: Datadog API — Cardinality
  description: 'Datadog API — Cardinality. 1 operations. Lead operation: Datadog Tag Configuration Cardinality Estimator.
    Self-contained Naftiko capability covering one Datadog business surface.'
  tags:
  - Datadog
  - Cardinality
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DATADOG_API_KEY: DATADOG_API_KEY
capability:
  consumes:
  - type: http
    namespace: datadog-cardinality
    baseUri: https://{subdomain}.{site}
    description: Datadog API — Cardinality business capability. Self-contained, no shared references.
    resources:
    - name: api-v2-metrics-metric_name-estimate
      path: /api/v2/metrics/{metric_name}/estimate
      operations:
      - name: estimatemetricsoutputseries
        method: GET
        description: Datadog Tag Configuration Cardinality Estimator
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: filter[groups]
          in: query
          type: string
          description: Filtered tag keys that the metric is configured to query with.
        - name: filter[hours_ago]
          in: query
          type: integer
          description: The number of hours of look back (from now) to estimate cardinality with. If unspecified, it defaults
            to 0 hours.
        - name: filter[num_aggregations]
          in: query
          type: integer
          description: Deprecated. Number of aggregations has no impact on volume.
        - name: filter[pct]
          in: query
          type: boolean
          description: A boolean, for distribution metrics only, to estimate cardinality if the metric includes additional
            percentile aggregators.
        - name: filter[timespan_h]
          in: query
          type: integer
          description: A window, in hours, from the look back to estimate cardinality with. The minimum and default is 1 hour.
    authentication:
      type: bearer
      token: '{{env.DATADOG_API_KEY}}'
  exposes:
  - type: rest
    namespace: datadog-cardinality-rest
    port: 8080
    description: REST adapter for Datadog API — Cardinality. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/v2/metrics/{metric-name}/estimate
      name: api-v2-metrics-metric-name-estimate
      description: REST surface for api-v2-metrics-metric_name-estimate.
      operations:
      - method: GET
        name: estimatemetricsoutputseries
        description: Datadog Tag Configuration Cardinality Estimator
        call: datadog-cardinality.estimatemetricsoutputseries
        with:
          filter[groups]: rest.filter[groups]
          filter[hours_ago]: rest.filter[hours_ago]
          filter[num_aggregations]: rest.filter[num_aggregations]
          filter[pct]: rest.filter[pct]
          filter[timespan_h]: rest.filter[timespan_h]
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: datadog-cardinality-mcp
    port: 9090
    transport: http
    description: MCP adapter for Datadog API — Cardinality. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: datadog-tag-configuration-cardinality-estimator
      description: Datadog Tag Configuration Cardinality Estimator
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: datadog-cardinality.estimatemetricsoutputseries
      with:
        filter[groups]: tools.filter[groups]
        filter[hours_ago]: tools.filter[hours_ago]
        filter[num_aggregations]: tools.filter[num_aggregations]
        filter[pct]: tools.filter[pct]
        filter[timespan_h]: tools.filter[timespan_h]
      outputParameters:
      - type: object
        mapping: $.
