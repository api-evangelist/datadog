        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Content-Encoding
          in: header
          type: string
          description: HTTP header used to compress the media-type.
        - name: ddtags
          in: query
          type: string
          description: Log tags can be passed as query parameters with `text/plain` content type.
        - name: body
          in: body
