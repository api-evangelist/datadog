naftiko: 1.0.0-alpha2
info:
  label: Datadog API — Settings
  description: 'Datadog API — Settings. 1 operations. Lead operation: Datadog Get Permission Settings for a Team. Self-contained
    Naftiko capability covering one Datadog business surface.'
  tags:
  - Datadog
  - Settings
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DATADOG_API_KEY: DATADOG_API_KEY
capability:
  consumes:
  - type: http
    namespace: datadog-settings
    baseUri: https://{subdomain}.{site}
    description: Datadog API — Settings business capability. Self-contained, no shared references.
    resources:
    - name: api-v2-team-team_id-permission-settings
      path: /api/v2/team/{team_id}/permission-settings
      operations:
      - name: getteampermissionsettings
        method: GET
        description: Datadog Get Permission Settings for a Team
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: team_id
          in: path
          type: string
          description: None
          required: true
    authentication:
      type: bearer
      token: '{{env.DATADOG_API_KEY}}'
  exposes:
  - type: rest
    namespace: datadog-settings-rest
    port: 8080
    description: REST adapter for Datadog API — Settings. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/v2/team/{team-id}/permission-settings
      name: api-v2-team-team-id-permission-settings
      description: REST surface for api-v2-team-team_id-permission-settings.
      operations:
      - method: GET
        name: getteampermissionsettings
        description: Datadog Get Permission Settings for a Team
        call: datadog-settings.getteampermissionsettings
        with:
          team_id: rest.team_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: datadog-settings-mcp
    port: 9090
    transport: http
    description: MCP adapter for Datadog API — Settings. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: datadog-get-permission-settings-team
      description: Datadog Get Permission Settings for a Team
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: datadog-settings.getteampermissionsettings
      with:
        team_id: tools.team_id
      outputParameters:
      - type: object
        mapping: $.
