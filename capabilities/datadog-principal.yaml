naftiko: 1.0.0-alpha2
info:
  label: Datadog API — Principal
  description: 'Datadog API — Principal. 1 operations. Lead operation: Datadog Create a Datadog Gcp Principal. Self-contained
    Naftiko capability covering one Datadog business surface.'
  tags:
  - Datadog
  - Principal
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DATADOG_API_KEY: DATADOG_API_KEY
capability:
  consumes:
  - type: http
    namespace: datadog-principal
    baseUri: https://{subdomain}.{site}
    description: Datadog API — Principal business capability. Self-contained, no shared references.
    resources:
    - name: api-v2-integration-gcp-sts_delegate
      path: /api/v2/integration/gcp/sts_delegate
      operations:
      - name: makegcpstsdelegate
        method: POST
        description: Datadog Create a Datadog Gcp Principal
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.DATADOG_API_KEY}}'
  exposes:
  - type: rest
    namespace: datadog-principal-rest
    port: 8080
    description: REST adapter for Datadog API — Principal. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/v2/integration/gcp/sts-delegate
      name: api-v2-integration-gcp-sts-delegate
      description: REST surface for api-v2-integration-gcp-sts_delegate.
      operations:
      - method: POST
        name: makegcpstsdelegate
        description: Datadog Create a Datadog Gcp Principal
        call: datadog-principal.makegcpstsdelegate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: datadog-principal-mcp
    port: 9090
    transport: http
    description: MCP adapter for Datadog API — Principal. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: datadog-create-datadog-gcp-principal
      description: Datadog Create a Datadog Gcp Principal
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: datadog-principal.makegcpstsdelegate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
