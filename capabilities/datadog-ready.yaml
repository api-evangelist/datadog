naftiko: 1.0.0-alpha2
info:
  label: Datadog API — Ready
  description: 'Datadog API — Ready. 1 operations. Lead operation: Datadog Get List of Aws Log Ready Services. Self-contained
    Naftiko capability covering one Datadog business surface.'
  tags:
  - Datadog
  - Ready
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DATADOG_API_KEY: DATADOG_API_KEY
capability:
  consumes:
  - type: http
    namespace: datadog-ready
    baseUri: https://{subdomain}.{site}
    description: Datadog API — Ready business capability. Self-contained, no shared references.
    resources:
    - name: api-v2-integration-aws-logs-services
      path: /api/v2/integration/aws/logs/services
      operations:
      - name: listawslogsservices
        method: GET
        description: Datadog Get List of Aws Log Ready Services
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.DATADOG_API_KEY}}'
  exposes:
  - type: rest
    namespace: datadog-ready-rest
    port: 8080
    description: REST adapter for Datadog API — Ready. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/api/v2/integration/aws/logs/services
      name: api-v2-integration-aws-logs-services
      description: REST surface for api-v2-integration-aws-logs-services.
      operations:
      - method: GET
        name: listawslogsservices
        description: Datadog Get List of Aws Log Ready Services
        call: datadog-ready.listawslogsservices
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: datadog-ready-mcp
    port: 9090
    transport: http
    description: MCP adapter for Datadog API — Ready. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: datadog-get-list-aws-log
      description: Datadog Get List of Aws Log Ready Services
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: datadog-ready.listawslogsservices
      outputParameters:
      - type: object
        mapping: $.
