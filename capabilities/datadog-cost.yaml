    - name: api-v2-cost_by_tag-monthly_cost_attribution
      path: /api/v2/cost_by_tag/monthly_cost_attribution
      operations:
      - name: getmonthlycostattribution
        method: GET
        description: Datadog Get Monthly Cost Attribution
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: start_month
          in: query
          type: string
          description: 'Datetime in ISO-8601 format, UTC, precise to month: `[YYYY-MM]` for cost beginning in this month.'
          required: true
        - name: end_month
          in: query
          type: string
          description: 'Datetime in ISO-8601 format, UTC, precise to month: `[YYYY-MM]` for cost ending this month.'
        - name: fields
          in: query
          type: string
          description: 'Comma-separated list specifying cost types (e.g., `<billing_dimension>_on_demand_cost`, `<billing_dimension>_committed_cost`,
            `<billing_dimension>_total_cost`) '
          required: true
        - name: sort_direction
          in: query
          type: string
          description: 'The direction to sort by: `[desc, asc]`.'
        - name: sort_name
          in: query
          type: string
          description: 'The billing dimension to sort by. Always sorted by total cost. Example: `infra_host`.'
        - name: tag_breakdown_keys
          in: query
          type: string
          description: Comma separated list of tag keys used to group cost. If no value is provided the cost will not be broken
            down by tags.
        - name: next_record_id
          in: query
          type: string
          description: List following results with a next_record_id provided in the previous query.
        - name: include_descendants
          in: query
          type: boolean
          description: Include child org cost in the response. Defaults to `true`.
    - name: api-v2-usage-cost_by_org
      path: /api/v2/usage/cost_by_org
      operations:
      - name: getcostbyorg
        method: GET
        description: Datadog Get Cost Across Multi-org Account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: start_month
          in: query
          type: string
          description: 'Datetime in ISO-8601 format, UTC, precise to month: `[YYYY-MM]` for cost beginning this month.'
          required: true
        - name: end_month
          in: query
          type: string
          description: 'Datetime in ISO-8601 format, UTC, precise to month: `[YYYY-MM]` for cost ending this month.'
    - name: api-v2-usage-estimated_cost
      path: /api/v2/usage/estimated_cost
      operations:
      - name: getestimatedcostbyorg
        method: GET
        description: Datadog Get Estimated Cost Across Your Account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: view
          in: query
          type: string
          description: String to specify whether cost is broken down at a parent-org level or at the sub-org level. Available
            views are `summary` and `sub-org`. Defaults to `summary`.
        - name: start_month
          in: query
          type: string
          description: 'Datetime in ISO-8601 format, UTC, precise to month: `[YYYY-MM]` for cost beginning this month. **Either
            start_month or start_date should be specified, but not b'
        - name: end_month
          in: query
          type: string
          description: 'Datetime in ISO-8601 format, UTC, precise to month: `[YYYY-MM]` for cost ending this month.'
        - name: start_date
          in: query
          type: string
          description: 'Datetime in ISO-8601 format, UTC, precise to day: `[YYYY-MM-DD]` for cost beginning this day. **Either
            start_month or start_date should be specified, but not bo'
        - name: end_date
          in: query
          type: string
          description: 'Datetime in ISO-8601 format, UTC, precise to day: `[YYYY-MM-DD]` for cost ending this day.'
        - name: include_connected_accounts
          in: query
          type: boolean
          description: Boolean to specify whether to include accounts connected to the current account as partner customers
            in the Datadog partner network program. Defaults to `false`
    - name: api-v2-usage-historical_cost
      path: /api/v2/usage/historical_cost
