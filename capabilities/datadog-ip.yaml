naftiko: 1.0.0-alpha2
info:
  label: Datadog API — Ip
  description: 'Datadog API — Ip. 2 operations. Lead operation: Datadog Get Ip Allowlist. Self-contained Naftiko capability
    covering one Datadog business surface.'
  tags:
  - Datadog
  - Ip
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DATADOG_API_KEY: DATADOG_API_KEY
capability:
  consumes:
  - type: http
    namespace: datadog-ip
    baseUri: https://{subdomain}.{site}
    description: Datadog API — Ip business capability. Self-contained, no shared references.
    resources:
    - name: api-v2-ip_allowlist
      path: /api/v2/ip_allowlist
      operations:
      - name: getipallowlist
        method: GET
        description: Datadog Get Ip Allowlist
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateipallowlist
        method: PATCH
        description: Datadog Update Ip Allowlist
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.DATADOG_API_KEY}}'
  exposes:
  - type: rest
    namespace: datadog-ip-rest
    port: 8080
    description: REST adapter for Datadog API — Ip. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/api/v2/ip-allowlist
      name: api-v2-ip-allowlist
      description: REST surface for api-v2-ip_allowlist.
      operations:
      - method: GET
        name: getipallowlist
        description: Datadog Get Ip Allowlist
        call: datadog-ip.getipallowlist
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updateipallowlist
        description: Datadog Update Ip Allowlist
        call: datadog-ip.updateipallowlist
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: datadog-ip-mcp
    port: 9090
    transport: http
    description: MCP adapter for Datadog API — Ip. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: datadog-get-ip-allowlist
      description: Datadog Get Ip Allowlist
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: datadog-ip.getipallowlist
      outputParameters:
      - type: object
        mapping: $.
    - name: datadog-update-ip-allowlist
      description: Datadog Update Ip Allowlist
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: datadog-ip.updateipallowlist
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
