      operations:
      - name: searchauditlogs
        method: POST
        description: Datadog Search Audit Logs Events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: api-v2-cases
      path: /api/v2/cases
      operations:
      - name: searchcases
        method: GET
        description: Datadog Search Cases
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: filter
          in: query
          type: string
          description: Search query
        - name: sort[asc]
          in: query
          type: boolean
          description: Specify if order is ascending or not
