  description: 'Datadog API — Search. 10 operations. Lead operation: Datadog Search Audit Logs Events. Self-contained Naftiko
    capability covering one Datadog business surface.'
  tags:
  - Datadog
  - Search
  created: '2026-05-19'
  modified: '2026-05-19'
