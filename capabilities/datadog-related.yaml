naftiko: 1.0.0-alpha2
info:
  label: Datadog API — Related
  description: 'Datadog API — Related. 2 operations. Lead operation: Datadog Related Assets to a Metric. Self-contained Naftiko
    capability covering one Datadog business surface.'
  tags:
  - Datadog
  - Related
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DATADOG_API_KEY: DATADOG_API_KEY
capability:
  consumes:
  - type: http
    namespace: datadog-related
    baseUri: https://{subdomain}.{site}
    description: Datadog API — Related business capability. Self-contained, no shared references.
    resources:
    - name: api-v2-metrics-metric_name-assets
      path: /api/v2/metrics/{metric_name}/assets
      operations:
      - name: listmetricassets
        method: GET
        description: Datadog Related Assets to a Metric
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-v2-security_monitoring-signals-signal_id-incidents
      path: /api/v2/security_monitoring/signals/{signal_id}/incidents
      operations:
      - name: editsecuritymonitoringsignalincidents
        method: PATCH
        description: Datadog Change the Related Incidents of a Security Signal
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.DATADOG_API_KEY}}'
  exposes:
  - type: rest
    namespace: datadog-related-rest
    port: 8080
    description: REST adapter for Datadog API — Related. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/v2/metrics/{metric-name}/assets
      name: api-v2-metrics-metric-name-assets
      description: REST surface for api-v2-metrics-metric_name-assets.
      operations:
      - method: GET
        name: listmetricassets
        description: Datadog Related Assets to a Metric
        call: datadog-related.listmetricassets
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v2/security-monitoring/signals/{signal-id}/incidents
      name: api-v2-security-monitoring-signals-signal-id-incidents
      description: REST surface for api-v2-security_monitoring-signals-signal_id-incidents.
      operations:
      - method: PATCH
        name: editsecuritymonitoringsignalincidents
        description: Datadog Change the Related Incidents of a Security Signal
        call: datadog-related.editsecuritymonitoringsignalincidents
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: datadog-related-mcp
    port: 9090
    transport: http
    description: MCP adapter for Datadog API — Related. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: datadog-related-assets-metric
      description: Datadog Related Assets to a Metric
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: datadog-related.listmetricassets
      outputParameters:
      - type: object
        mapping: $.
    - name: datadog-change-related-incidents-security
      description: Datadog Change the Related Incidents of a Security Signal
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: datadog-related.editsecuritymonitoringsignalincidents
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
