  - type: http
    namespace: datadog-instance
    baseUri: https://{subdomain}.{site}
    description: Datadog API — Instance business capability. Self-contained, no shared references.
    resources:
    - name: api-v2-workflows-workflow_id-instances-instance_id
      path: /api/v2/workflows/{workflow_id}/instances/{instance_id}
      operations:
      - name: getworkflowinstance
        method: GET
        description: Datadog Get a Workflow Instance
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-v2-workflows-workflow_id-instances-instance_id-cancel
      path: /api/v2/workflows/{workflow_id}/instances/{instance_id}/cancel
      operations:
      - name: cancelworkflowinstance
