      name: api-v2-workflows-workflow-id-instances-instance-id
      description: REST surface for api-v2-workflows-workflow_id-instances-instance_id.
      operations:
      - method: GET
        name: getworkflowinstance
        description: Datadog Get a Workflow Instance
        call: datadog-instance.getworkflowinstance
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v2/workflows/{workflow-id}/instances/{instance-id}/cancel
      name: api-v2-workflows-workflow-id-instances-instance-id-cancel
      description: REST surface for api-v2-workflows-workflow_id-instances-instance_id-cancel.
      operations:
      - method: PUT
        name: cancelworkflowinstance
        description: Datadog Cancel a Workflow Instance
        call: datadog-instance.cancelworkflowinstance
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
