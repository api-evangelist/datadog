      description: Datadog Get a Workflow Instance
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: datadog-instance.getworkflowinstance
      outputParameters:
      - type: object
        mapping: $.
    - name: datadog-cancel-workflow-instance
      description: Datadog Cancel a Workflow Instance
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: datadog-instance.cancelworkflowinstance
      outputParameters:
      - type: object
        mapping: $.
