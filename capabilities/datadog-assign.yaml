naftiko: 1.0.0-alpha2
info:
  label: Datadog API — Assign
  description: 'Datadog API — Assign. 1 operations. Lead operation: Datadog Assign Case. Self-contained Naftiko capability
    covering one Datadog business surface.'
  tags:
  - Datadog
  - Assign
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DATADOG_API_KEY: DATADOG_API_KEY
capability:
  consumes:
  - type: http
    namespace: datadog-assign
    baseUri: https://{subdomain}.{site}
    description: Datadog API — Assign business capability. Self-contained, no shared references.
    resources:
    - name: api-v2-cases-case_id-assign
      path: /api/v2/cases/{case_id}/assign
      operations:
      - name: assigncase
        method: POST
        description: Datadog Assign Case
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.DATADOG_API_KEY}}'
  exposes:
  - type: rest
    namespace: datadog-assign-rest
    port: 8080
    description: REST adapter for Datadog API — Assign. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/api/v2/cases/{case-id}/assign
      name: api-v2-cases-case-id-assign
      description: REST surface for api-v2-cases-case_id-assign.
      operations:
      - method: POST
        name: assigncase
        description: Datadog Assign Case
        call: datadog-assign.assigncase
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: datadog-assign-mcp
    port: 9090
    transport: http
    description: MCP adapter for Datadog API — Assign. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: datadog-assign-case
      description: Datadog Assign Case
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: datadog-assign.assigncase
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
