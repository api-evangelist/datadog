      name: api-v2-incidents-config-types
      description: REST surface for api-v2-incidents-config-types.
      operations:
      - method: GET
        name: listincidenttypes
        description: Datadog Get a List of Incident Types
        call: datadog-types.listincidenttypes
        outputParameters:
        - type: object
          mapping: $.
