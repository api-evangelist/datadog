naftiko: 1.0.0-alpha2
info:
  label: Datadog API — Detection
  description: 'Datadog API — Detection. 2 operations. Lead operation: Datadog Create a Detection Rule. Self-contained Naftiko
    capability covering one Datadog business surface.'
  tags:
  - Datadog
  - Detection
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DATADOG_API_KEY: DATADOG_API_KEY
capability:
  consumes:
  - type: http
    namespace: datadog-detection
    baseUri: https://{subdomain}.{site}
    description: Datadog API — Detection business capability. Self-contained, no shared references.
    resources:
    - name: api-v2-security_monitoring-rules
      path: /api/v2/security_monitoring/rules
      operations:
      - name: createsecuritymonitoringrule
        method: POST
        description: Datadog Create a Detection Rule
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-v2-security_monitoring-rules-validation
      path: /api/v2/security_monitoring/rules/validation
      operations:
      - name: validatesecuritymonitoringrule
        method: POST
        description: Datadog Validate a Detection Rule
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.DATADOG_API_KEY}}'
  exposes:
  - type: rest
    namespace: datadog-detection-rest
    port: 8080
    description: REST adapter for Datadog API — Detection. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/v2/security-monitoring/rules
      name: api-v2-security-monitoring-rules
      description: REST surface for api-v2-security_monitoring-rules.
      operations:
      - method: POST
        name: createsecuritymonitoringrule
        description: Datadog Create a Detection Rule
        call: datadog-detection.createsecuritymonitoringrule
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v2/security-monitoring/rules/validation
      name: api-v2-security-monitoring-rules-validation
      description: REST surface for api-v2-security_monitoring-rules-validation.
      operations:
      - method: POST
        name: validatesecuritymonitoringrule
        description: Datadog Validate a Detection Rule
        call: datadog-detection.validatesecuritymonitoringrule
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: datadog-detection-mcp
    port: 9090
    transport: http
    description: MCP adapter for Datadog API — Detection. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: datadog-create-detection-rule
      description: Datadog Create a Detection Rule
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: datadog-detection.createsecuritymonitoringrule
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: datadog-validate-detection-rule
      description: Datadog Validate a Detection Rule
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: datadog-detection.validatesecuritymonitoringrule
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
