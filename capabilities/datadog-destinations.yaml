naftiko: 1.0.0-alpha2
info:
  label: Datadog API — Destinations
  description: 'Datadog API — Destinations. 1 operations. Lead operation: Datadog Get All Custom Destinations. Self-contained
    Naftiko capability covering one Datadog business surface.'
  tags:
  - Datadog
  - Destinations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DATADOG_API_KEY: DATADOG_API_KEY
capability:
  consumes:
  - type: http
    namespace: datadog-destinations
    baseUri: https://{subdomain}.{site}
    description: Datadog API — Destinations business capability. Self-contained, no shared references.
    resources:
    - name: api-v2-logs-config-custom-destinations
      path: /api/v2/logs/config/custom-destinations
      operations:
      - name: listlogscustomdestinations
        method: GET
        description: Datadog Get All Custom Destinations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.DATADOG_API_KEY}}'
  exposes:
  - type: rest
    namespace: datadog-destinations-rest
    port: 8080
    description: REST adapter for Datadog API — Destinations. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/v2/logs/config/custom-destinations
      name: api-v2-logs-config-custom-destinations
      description: REST surface for api-v2-logs-config-custom-destinations.
      operations:
      - method: GET
        name: listlogscustomdestinations
        description: Datadog Get All Custom Destinations
        call: datadog-destinations.listlogscustomdestinations
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: datadog-destinations-mcp
    port: 9090
    transport: http
    description: MCP adapter for Datadog API — Destinations. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: datadog-get-all-custom-destinations
      description: Datadog Get All Custom Destinations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: datadog-destinations.listlogscustomdestinations
      outputParameters:
      - type: object
        mapping: $.
