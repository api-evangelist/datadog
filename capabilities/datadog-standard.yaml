naftiko: 1.0.0-alpha2
info:
  label: Datadog API — Standard
  description: 'Datadog API — Standard. 1 operations. Lead operation: Datadog List Standard Patterns. Self-contained Naftiko
    capability covering one Datadog business surface.'
  tags:
  - Datadog
  - Standard
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DATADOG_API_KEY: DATADOG_API_KEY
capability:
  consumes:
  - type: http
    namespace: datadog-standard
    baseUri: https://{subdomain}.{site}
    description: Datadog API — Standard business capability. Self-contained, no shared references.
    resources:
    - name: api-v2-sensitive-data-scanner-config-standard-patterns
      path: /api/v2/sensitive-data-scanner/config/standard-patterns
      operations:
      - name: liststandardpatterns
        method: GET
        description: Datadog List Standard Patterns
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.DATADOG_API_KEY}}'
  exposes:
  - type: rest
    namespace: datadog-standard-rest
    port: 8080
    description: REST adapter for Datadog API — Standard. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/v2/sensitive-data-scanner/config/standard-patterns
      name: api-v2-sensitive-data-scanner-config-standard-patterns
      description: REST surface for api-v2-sensitive-data-scanner-config-standard-patterns.
      operations:
      - method: GET
        name: liststandardpatterns
        description: Datadog List Standard Patterns
        call: datadog-standard.liststandardpatterns
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: datadog-standard-mcp
    port: 9090
    transport: http
    description: MCP adapter for Datadog API — Standard. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: datadog-list-standard-patterns
      description: Datadog List Standard Patterns
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: datadog-standard.liststandardpatterns
      outputParameters:
      - type: object
        mapping: $.
