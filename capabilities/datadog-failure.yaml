naftiko: 1.0.0-alpha2
info:
  label: Datadog API — Failure
  description: 'Datadog API — Failure. 2 operations. Lead operation: Datadog Get a List of Failure Events. Self-contained
    Naftiko capability covering one Datadog business surface.'
  tags:
  - Datadog
  - Failure
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DATADOG_API_KEY: DATADOG_API_KEY
capability:
  consumes:
  - type: http
    namespace: datadog-failure
    baseUri: https://{subdomain}.{site}
    description: Datadog API — Failure business capability. Self-contained, no shared references.
    resources:
    - name: api-v2-dora-failures
      path: /api/v2/dora/failures
      operations:
      - name: listdorafailures
        method: POST
        description: Datadog Get a List of Failure Events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-v2-dora-failures-failure_id
      path: /api/v2/dora/failures/{failure_id}
      operations:
      - name: getdorafailure
        method: GET
        description: Datadog Get a Failure Event
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: failure_id
          in: path
          type: string
          description: The ID of the failure event.
          required: true
    authentication:
      type: bearer
      token: '{{env.DATADOG_API_KEY}}'
  exposes:
  - type: rest
    namespace: datadog-failure-rest
    port: 8080
    description: REST adapter for Datadog API — Failure. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/v2/dora/failures
      name: api-v2-dora-failures
      description: REST surface for api-v2-dora-failures.
      operations:
      - method: POST
        name: listdorafailures
        description: Datadog Get a List of Failure Events
        call: datadog-failure.listdorafailures
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v2/dora/failures/{failure-id}
      name: api-v2-dora-failures-failure-id
      description: REST surface for api-v2-dora-failures-failure_id.
      operations:
      - method: GET
        name: getdorafailure
        description: Datadog Get a Failure Event
        call: datadog-failure.getdorafailure
        with:
          failure_id: rest.failure_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: datadog-failure-mcp
    port: 9090
    transport: http
    description: MCP adapter for Datadog API — Failure. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: datadog-get-list-failure-events
      description: Datadog Get a List of Failure Events
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: datadog-failure.listdorafailures
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: datadog-get-failure-event
      description: Datadog Get a Failure Event
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: datadog-failure.getdorafailure
      with:
        failure_id: tools.failure_id
      outputParameters:
      - type: object
        mapping: $.
