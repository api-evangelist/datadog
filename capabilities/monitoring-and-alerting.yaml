naftiko: 1.0.0-alpha2
info:
  label: Datadog Monitoring And Alerting
  description: Unified workflow for infrastructure monitoring and alerting combining monitors, metrics, hosts, and dashboards.
    Used by SREs and DevOps engineers for setting up alerts, querying metrics, tracking host health, and organizing dashboards.
  tags:
  - Datadog
  - Monitoring
  - Alerting
  - Metrics
  - Dashboards
  - Infrastructure
  personas:
  - SRE
  - DevOps Engineer
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    DATADOG_API_KEY: DATADOG_API_KEY
    DATADOG_APP_KEY: DATADOG_APP_KEY
capability:
  consumes:
  - type: http
    namespace: dd-monitors
    baseUri: https://api.datadoghq.com
    description: Datadog Monitors API for creating, reading, updating, deleting, muting, unmuting, and validating monitors.
    authentication:
      type: apikey
      headers:
        DD-API-KEY: '{{DATADOG_API_KEY}}'
        DD-APPLICATION-KEY: '{{DATADOG_APP_KEY}}'
    resources:
    - name: monitors
      path: /api/v1/monitor
      description: Monitor collection operations.
      operations:
      - name: createMonitor
        method: POST
        description: Create a monitor.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: listMonitors
        method: GET
        description: List all monitors.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: monitor
      path: /api/v1/monitor/{monitor_id}
      description: Individual monitor operations.
      operations:
      - name: getMonitor
        method: GET
        description: Get a monitor.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateMonitor
        method: PUT
        description: Edit a monitor.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleteMonitor
        method: DELETE
        description: Delete a monitor.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: monitor-muting
      path: /api/v1/monitor/{monitor_id}
      description: Mute and unmute monitor notifications.
      operations:
      - name: muteMonitor
        method: POST
        path: /api/v1/monitor/{monitor_id}/mute
        description: Mute a monitor.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: unmuteMonitor
        method: POST
        path: /api/v1/monitor/{monitor_id}/unmute
        description: Unmute a monitor.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: monitor-validation
      path: /api/v1/monitor/validate
      description: Validate monitor configurations before creation.
      operations:
      - name: validateMonitor
        method: POST
        description: Validate a monitor.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: dd-metrics
    baseUri: https://api.datadoghq.com
    description: Datadog Metrics API for submitting, querying, and managing metrics and tag configurations.
    authentication:
      type: apikey
      headers:
        DD-API-KEY: '{{DATADOG_API_KEY}}'
        DD-APPLICATION-KEY: '{{DATADOG_APP_KEY}}'
    resources:
    - name: metrics-submit
      path: /api/v2/series
      description: Submit metric data points.
      operations:
      - name: submitMetrics
        method: POST
        description: Submit metrics.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: metrics-query
      path: /api/v2/query
      description: Query metric data.
      operations:
      - name: queryMetricsTimeseries
        method: POST
        path: /api/v2/query/timeseries
        description: Query timeseries data.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: queryMetricsScalar
        method: POST
        path: /api/v2/query/scalar
        description: Query scalar data.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: metrics-list
      path: /api/v1/metrics
      description: List active metrics.
      operations:
      - name: listActiveMetrics
        method: GET
        description: List active metrics.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: metric-tags
      path: /api/v2/metrics/{metric_name}/tags
      description: Manage metric tag configurations.
      operations:
      - name: getMetricTagConfiguration
        method: GET
        description: List tags by metric name.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createMetricTagConfiguration
        method: POST
        description: Create a tag configuration.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateMetricTagConfiguration
        method: PATCH
        description: Update a tag configuration.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleteMetricTagConfiguration
        method: DELETE
        description: Delete a tag configuration.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: dd-hosts
    baseUri: https://api.datadoghq.com
    description: Datadog Hosts and Containers API for CSM coverage analysis. Sourced from datadog-api-openapi.yml (1 operation
      for hosts and containers coverage).
    authentication:
      type: apikey
      headers:
        DD-API-KEY: '{{DATADOG_API_KEY}}'
        DD-APPLICATION-KEY: '{{DATADOG_APP_KEY}}'
    resources:
    - name: hosts-coverage
      path: /api/v2/csm/onboarding/coverage_analysis/hosts_and_containers
      description: Host and container coverage analysis.
      operations:
      - name: GetCSMHostsAndContainersCoverageAnalysis
        method: GET
        description: Get CSM hosts and containers coverage analysis.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: dd-dashboards
    baseUri: https://api.datadoghq.com
    description: Datadog Dashboard List Items API for managing dashboards within dashboard lists. Sourced from datadog-api-openapi.yml
      (4 operations on dashboard list items).
    authentication:
      type: apikey
      headers:
        DD-API-KEY: '{{DATADOG_API_KEY}}'
        DD-APPLICATION-KEY: '{{DATADOG_APP_KEY}}'
    resources:
    - name: dashboard-list-items
      path: /api/v2/dashboard/lists/manual/{dashboard_list_id}/dashboards
      description: Dashboard list item operations.
      operations:
      - name: GetDashboardListItems
        method: GET
        description: Fetch the dashboard list's dashboard definitions.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: CreateDashboardListItems
        method: POST
        description: Add dashboards to an existing dashboard list.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: UpdateDashboardListItems
        method: PUT
        description: Update dashboards of an existing dashboard list.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: DeleteDashboardListItems
        method: DELETE
        description: Delete dashboards from an existing dashboard list.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: dd-monitoring-alerting-api
    description: Unified REST API for monitoring and alerting workflows combining monitors, metrics, hosts, and dashboards.
    resources:
    - path: /v1/monitors
      name: monitors
      description: Monitor management
      operations:
      - method: GET
        name: listMonitors
        description: List all monitors
        call: dd-monitors.listMonitors
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createMonitor
        description: Create a monitor
        call: dd-monitors.createMonitor
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/monitors/{monitor_id}
      name: monitor
      description: Individual monitor operations
      operations:
      - method: GET
        name: getMonitor
        description: Get a monitor
        call: dd-monitors.getMonitor
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateMonitor
        description: Update a monitor
        call: dd-monitors.updateMonitor
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteMonitor
        description: Delete a monitor
        call: dd-monitors.deleteMonitor
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/monitors/{monitor_id}/mute
      name: monitor-mute
      description: Mute a monitor
      operations:
      - method: POST
        name: muteMonitor
        description: Mute a monitor
        call: dd-monitors.muteMonitor
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/metrics
      name: metrics
      description: Active metrics
      operations:
      - method: GET
        name: listActiveMetrics
        description: List active metrics
        call: dd-metrics.listActiveMetrics
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/metrics/query/timeseries
      name: metrics-timeseries
      description: Query timeseries
      operations:
      - method: POST
        name: queryMetricsTimeseries
        description: Query timeseries data
        call: dd-metrics.queryMetricsTimeseries
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/metrics/series
      name: metrics-submit
      description: Submit metrics
      operations:
      - method: POST
        name: submitMetrics
        description: Submit metrics
        call: dd-metrics.submitMetrics
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/hosts/coverage
      name: hosts-coverage
      description: Host coverage
      operations:
      - method: GET
        name: GetCSMHostsAndContainersCoverageAnalysis
        description: Get hosts coverage
        call: dd-hosts.GetCSMHostsAndContainersCoverageAnalysis
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/dashboard-lists/{dashboard_list_id}/dashboards
      name: dashboard-list-items
      description: Dashboard list items
      operations:
      - method: GET
        name: GetDashboardListItems
        description: Get dashboards in a list
        call: dd-dashboards.GetDashboardListItems
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9080
    namespace: dd-monitoring-alerting-mcp
    transport: http
    description: MCP server for AI-assisted monitoring and alerting workflows.
    tools:
    - name: list-monitors
      description: List all monitors
      call: dd-monitors.listMonitors
      hints:
        readOnly: true
    - name: get-monitor
      description: Get a monitor by ID
      call: dd-monitors.getMonitor
      hints:
        readOnly: true
    - name: create-monitor
      description: Create a new monitor
      call: dd-monitors.createMonitor
    - name: update-monitor
      description: Edit an existing monitor
      call: dd-monitors.updateMonitor
      hints:
        idempotent: true
    - name: delete-monitor
      description: Delete a monitor
      call: dd-monitors.deleteMonitor
      hints:
        destructive: true
    - name: mute-monitor
      description: Mute a monitor to suppress notifications
      call: dd-monitors.muteMonitor
    - name: unmute-monitor
      description: Unmute a monitor to resume notifications
      call: dd-monitors.unmuteMonitor
    - name: validate-monitor
      description: Validate a monitor configuration
      call: dd-monitors.validateMonitor
      hints:
        readOnly: true
    - name: submit-metrics
      description: Submit metric data points
      call: dd-metrics.submitMetrics
    - name: query-timeseries
      description: Query timeseries metric data
      call: dd-metrics.queryMetricsTimeseries
      hints:
        readOnly: true
    - name: query-scalar
      description: Query scalar metric data
      call: dd-metrics.queryMetricsScalar
      hints:
        readOnly: true
    - name: list-active-metrics
      description: List active metrics
      call: dd-metrics.listActiveMetrics
      hints:
        readOnly: true
    - name: get-hosts-coverage
      description: Get CSM hosts and containers coverage
      call: dd-hosts.GetCSMHostsAndContainersCoverageAnalysis
      hints:
        readOnly: true
    - name: get-dashboard-list-items
      description: Fetch dashboards in a dashboard list
      call: dd-dashboards.GetDashboardListItems
      hints:
        readOnly: true
    - name: add-dashboard-list-items
      description: Add dashboards to a dashboard list
      call: dd-dashboards.CreateDashboardListItems
