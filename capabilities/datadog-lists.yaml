        name: listapmretentionfilters
        description: Datadog List All Apm Retention Filters
        call: datadog-lists.listapmretentionfilters
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v2/app-builder/apps
      name: api-v2-app-builder-apps
      description: REST surface for api-v2-app-builder-apps.
      operations:
      - method: GET
        name: listapps
        description: Datadog List Apps
        call: datadog-lists.listapps
        with:
          limit: rest.limit
          page: rest.page
          filter[user_name]: rest.filter[user_name]
          filter[user_uuid]: rest.filter[user_uuid]
          filter[name]: rest.filter[name]
