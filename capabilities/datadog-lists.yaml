      /v1.
    resources:
    - path: /v1/api/v2/apicatalog/api
      name: api-v2-apicatalog-api
      description: REST surface for api-v2-apicatalog-api.
      operations:
      - method: GET
        name: listapis
        description: Datadog List Apis
        call: datadog-lists.listapis
        with:
          query: rest.query
          page[limit]: rest.page[limit]
          page[offset]: rest.page[offset]
        outputParameters:
        - type: object
          mapping: $.
