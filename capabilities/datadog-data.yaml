naftiko: 1.0.0-alpha2
info:
  label: Datadog API — Data
  description: 'Datadog API — Data. 2 operations. Lead operation: Datadog Query Scalar Data Across Multiple Products. Self-contained
    Naftiko capability covering one Datadog business surface.'
  tags:
  - Datadog
  - Data
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DATADOG_API_KEY: DATADOG_API_KEY
capability:
  consumes:
  - type: http
    namespace: datadog-data
    baseUri: https://{subdomain}.{site}
    description: Datadog API — Data business capability. Self-contained, no shared references.
    resources:
    - name: api-v2-query-scalar
      path: /api/v2/query/scalar
      operations:
      - name: queryscalardata
        method: POST
        description: Datadog Query Scalar Data Across Multiple Products
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-v2-query-timeseries
      path: /api/v2/query/timeseries
      operations:
      - name: querytimeseriesdata
        method: POST
        description: Datadog Query Timeseries Data Across Multiple Products
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.DATADOG_API_KEY}}'
  exposes:
  - type: rest
    namespace: datadog-data-rest
    port: 8080
    description: REST adapter for Datadog API — Data. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/api/v2/query/scalar
      name: api-v2-query-scalar
      description: REST surface for api-v2-query-scalar.
      operations:
      - method: POST
        name: queryscalardata
        description: Datadog Query Scalar Data Across Multiple Products
        call: datadog-data.queryscalardata
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v2/query/timeseries
      name: api-v2-query-timeseries
      description: REST surface for api-v2-query-timeseries.
      operations:
      - method: POST
        name: querytimeseriesdata
        description: Datadog Query Timeseries Data Across Multiple Products
        call: datadog-data.querytimeseriesdata
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: datadog-data-mcp
    port: 9090
    transport: http
    description: MCP adapter for Datadog API — Data. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: datadog-query-scalar-data-across
      description: Datadog Query Scalar Data Across Multiple Products
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: datadog-data.queryscalardata
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: datadog-query-timeseries-data-across
      description: Datadog Query Timeseries Data Across Multiple Products
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: datadog-data.querytimeseriesdata
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
