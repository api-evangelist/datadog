naftiko: 1.0.0-alpha2
info:
  label: Datadog API — Disables
  description: 'Datadog API — Disables. 1 operations. Lead operation: Datadog Disable a User. Self-contained Naftiko capability
    covering one Datadog business surface.'
  tags:
  - Datadog
  - Disables
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DATADOG_API_KEY: DATADOG_API_KEY
capability:
  consumes:
  - type: http
    namespace: datadog-disables
    baseUri: https://{subdomain}.{site}
    description: Datadog API — Disables business capability. Self-contained, no shared references.
    resources:
    - name: api-v2-users-user_id
      path: /api/v2/users/{user_id}
      operations:
      - name: disableuser
        method: DELETE
        description: Datadog Disable a User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.DATADOG_API_KEY}}'
  exposes:
  - type: rest
    namespace: datadog-disables-rest
    port: 8080
    description: REST adapter for Datadog API — Disables. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/v2/users/{user-id}
      name: api-v2-users-user-id
      description: REST surface for api-v2-users-user_id.
      operations:
      - method: DELETE
        name: disableuser
        description: Datadog Disable a User
        call: datadog-disables.disableuser
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: datadog-disables-mcp
    port: 9090
    transport: http
    description: MCP adapter for Datadog API — Disables. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: datadog-disable-user
      description: Datadog Disable a User
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: datadog-disables.disableuser
      outputParameters:
      - type: object
        mapping: $.
