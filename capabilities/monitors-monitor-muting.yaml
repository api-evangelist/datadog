      key: DD-API-KEY
      value: '{{env.DATADOG_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: monitors-monitor-muting-rest
    port: 8080
    description: REST adapter for Datadog Monitors API — Monitor Muting. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
