        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.DATADOG_API_KEY}}'
  exposes:
  - type: rest
    namespace: datadog-post-rest
    port: 8080
    description: REST adapter for Datadog API — Post. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/api/v2/agentless-scanning/accounts/aws
      name: api-v2-agentless-scanning-accounts-aws
      description: REST surface for api-v2-agentless_scanning-accounts-aws.
      operations:
      - method: POST
        name: createawsscanoptions
        description: Datadog Post Aws Scan Options
        call: datadog-post.createawsscanoptions
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v2/agentless-scanning/ondemand/aws
