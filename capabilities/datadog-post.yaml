    port: 9090
    transport: http
    description: MCP adapter for Datadog API — Post. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: datadog-post-aws-scan-options
      description: Datadog Post Aws Scan Options
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: datadog-post.createawsscanoptions
      with:
        body: tools.body
      outputParameters:
      - type: object
