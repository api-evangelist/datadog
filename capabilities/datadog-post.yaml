      - name: createawsscanoptions
        method: POST
        description: Datadog Post Aws Scan Options
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-v2-agentless_scanning-ondemand-aws
      path: /api/v2/agentless_scanning/ondemand/aws
