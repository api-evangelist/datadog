      name: api-v2-roles-role-id-users
      description: REST surface for api-v2-roles-role_id-users.
      operations:
      - method: DELETE
        name: removeuserfromrole
        description: Datadog Remove a User from a Role
        call: datadog-remove.removeuserfromrole
        with:
          body: rest.body
        outputParameters:
