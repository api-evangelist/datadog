          in: path
          type: string
          description: None
          required: true
        - name: link_id
          in: path
          type: string
          description: None
          required: true
    - name: api-v2-team-team_id-memberships-user_id
      path: /api/v2/team/{team_id}/memberships/{user_id}
      operations:
      - name: deleteteammembership
        method: DELETE
        description: Datadog Remove a User from a Team
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
