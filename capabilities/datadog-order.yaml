    port: 9090
    transport: http
    description: MCP adapter for Datadog API — Order. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: datadog-get-archive-order
      description: Datadog Get Archive Order
      hints:
        readOnly: true
        destructive: false
        idempotent: true
