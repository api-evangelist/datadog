vocabulary: 1.0.0
info:
  provider: Datadog
  description: Vocabulary for the Datadog observability platform covering monitoring,
    APM, logs, security, and incident management across 85 API endpoints.
  created: '2026-04-17'
  modified: '2026-04-17'
operational:
  apis:
  - name: Datadog API v1
    namespace: dd-v1
    baseUrl: https://api.datadoghq.com/api/v1
    status: active
  - name: Datadog API v2
    namespace: dd-v2
    baseUrl: https://api.datadoghq.com/api/v2
    status: active
  resources:
  - name: monitors
    description: Alert monitors and notifications.
  - name: dashboards
    description: Custom visualization dashboards.
  - name: metrics
    description: Time-series metrics data.
  - name: logs
    description: Log entries and analytics.
  - name: traces
    description: Distributed traces and spans.
  - name: events
    description: Event stream entries.
  - name: incidents
    description: Incident management records.
  - name: slos
    description: Service level objectives.
  - name: synthetics
    description: Synthetic test definitions.
  - name: hosts
    description: Infrastructure host inventory.
capability:
