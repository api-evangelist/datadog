    name: Datadog API
    tags:
      - Monitoring
      - Observability
    humanURL: https://docs.datadoghq.com/api/latest/
    baseURL: https://api.datadoghq.com
    image: https://imgix.datadoghq.com/img/dd_logo_n_70x75.png
