        type: Documentation
      - url: https://docs.datadoghq.com/metrics/
        type: Reference
    description: >-
      The Metrics API allows you to post metrics data to be graphed on Datadog
      dashboards, query metrics from any time period as timeseries or scalar
      values, and modify tag configurations for metrics. It also supports
